<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" />
  
  <!-- Terminal window -->
  <rect x="128" y="128" width="256" height="192" rx="16" fill="#1e1b4b" />
  
  <!-- Terminal header -->
  <rect x="128" y="128" width="256" height="32" rx="16" fill="#312e81" />
  
  <!-- Terminal buttons -->
  <circle cx="152" cy="144" r="6" fill="#ef4444" />
  <circle cx="176" cy="144" r="6" fill="#f59e0b" />
  <circle cx="200" cy="144" r="6" fill="#10b981" />
  
  <!-- Code lines -->
  <rect x="152" y="180" width="208" height="8" rx="4" fill="#c7d2fe" />
  <rect x="152" y="200" width="168" height="8" rx="4" fill="#c7d2fe" />
  <rect x="152" y="220" width="192" height="8" rx="4" fill="#c7d2fe" />
  <rect x="152" y="240" width="144" height="8" rx="4" fill="#c7d2fe" />
  <rect x="152" y="260" width="176" height="8" rx="4" fill="#c7d2fe" />
  
  <!-- Prompt symbol -->
  <rect x="152" y="180" width="16" height="8" rx="4" fill="#8b5cf6" />
  <rect x="152" y="200" width="16" height="8" rx="4" fill="#8b5cf6" />
  <rect x="152" y="220" width="16" height="8" rx="4" fill="#8b5cf6" />
  <rect x="152" y="240" width="16" height="8" rx="4" fill="#8b5cf6" />
  <rect x="152" y="260" width="16" height="8" rx="4" fill="#8b5cf6" />
  
  <!-- Gear icon (representing tools) -->
  <circle cx="384" cy="320" r="40" fill="#312e81" stroke="#c7d2fe" stroke-width="4" />
  <path d="M384 290 L384 310 M384 350 L384 370 M414 320 L394 320 M354 320 L334 320" 
        stroke="#c7d2fe" stroke-width="8" stroke-linecap="round" />
  <path d="M384 290 L384 310 M384 350 L384 370 M414 320 L394 320 M354 320 L334 320" 
        stroke="#c7d2fe" stroke-width="4" stroke-linecap="round" transform="rotate(45 384 320)" />
  
  <!-- Home icon (representing dashboard) -->
  <path d="M128 320 L168 290 L208 320 L208 360 L168 390 L128 360 Z" 
        fill="#312e81" stroke="#c7d2fe" stroke-width="4" />
  <rect x="148" y="330" width="40" height="30" rx="4" fill="#1e1b4b" />
  <rect x="158" y="340" width="20" height="10" rx="2" fill="#c7d2fe" />
</svg>