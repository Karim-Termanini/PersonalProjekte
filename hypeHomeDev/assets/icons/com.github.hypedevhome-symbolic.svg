<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Simple symbolic icon - terminal window with gear -->
  <rect x="2" y="2" width="12" height="9" rx="1" fill="currentColor" opacity="0.8" />
  <rect x="2" y="2" width="12" height="2" rx="1" fill="currentColor" />
  
  <!-- Terminal buttons -->
  <circle cx="4" cy="3" r="0.5" fill="currentColor" opacity="0.6" />
  <circle cx="5.5" cy="3" r="0.5" fill="currentColor" opacity="0.6" />
  <circle cx="7" cy="3" r="0.5" fill="currentColor" opacity="0.6" />
  
  <!-- Code lines -->
  <rect x="3" y="5" width="8" height="0.5" rx="0.25" fill="currentColor" opacity="0.6" />
  <rect x="3" y="6" width="6" height="0.5" rx="0.25" fill="currentColor" opacity="0.6" />
  <rect x="3" y="7" width="7" height="0.5" rx="0.25" fill="currentColor" opacity="0.6" />
  
  <!-- Gear outline -->
  <circle cx="12" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.8" />
  <path d="M12 10 L12 11 M12 13 L12 14 M14 12 L13 12 M10 12 L9 12" 
        stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.8" />
  <path d="M12 10 L12 11 M12 13 L12 14 M14 12 L13 12 M10 12 L9 12" 
        stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.8" 
        transform="rotate(45 12 12)" />
</svg>